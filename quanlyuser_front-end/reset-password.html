<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Luyện Thi ĐGNL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --light-bg: #f3f4f6;
            --border-color: #e5e7eb;
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: var(--gradient-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: var(--gradient-primary);
            color: var(--white);
            padding: 40px 30px;
            text-align: center;
        }

        .header i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--primary-color);
        }

        .input-field {
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .input-field input {
            width: 100%;
            padding: 15px 45px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            left: auto !important;
            cursor: pointer;
        }

        .password-strength {
            margin-top: 10px;
        }

        .strength-bar {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        .strength-segment {
            height: 4px;
            flex: 1;
            background: var(--border-color);
            border-radius: 2px;
        }

        .strength-segment.active {
            background: var(--success-color);
        }

        .strength-text {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid var(--success-color);
        }

        .alert-error {
            background: #fee2e2;
            color: var(--danger-color);
            border-left: 4px solid var(--danger-color);
        }

        .alert-info {
            background: #dbeafe;
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .token-info {
            background: var(--light-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .token-info i {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .token-info p {
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .token-info .email {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 1.1rem;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-key"></i>
            <h1>Đặt lại mật khẩu</h1>
            <p>Tạo mật khẩu mới cho tài khoản của bạn</p>
        </div>

        <div class="content">
            <div id="alertContainer"></div>

            <!-- Hiển thị thông tin token -->
            <div class="token-info" id="tokenInfo">
                <i class="fas fa-envelope"></i>
                <p>Đang xác thực thông tin...</p>
            </div>

            <!-- Form đặt lại mật khẩu -->
            <form id="resetPasswordForm">
                <input type="hidden" id="token" name="token">
                <input type="hidden" id="email" name="email">

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Mật khẩu mới
                    </label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Ít nhất 6 ký tự" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('newPassword', event)"></i>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                        </div>
                        <span class="strength-text">Độ mạnh: Yếu</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Xác nhận mật khẩu
                    </label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', event)"></i>
                    </div>
                    <div id="passwordMatchError" style="color: var(--danger-color); font-size: 0.85rem; margin-top: 5px; display: none;">
                        <i class="fas fa-exclamation-circle"></i>
                        Mật khẩu không khớp
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="resetBtn">
                    <i class="fas fa-save"></i>
                    Đặt lại mật khẩu
                </button>
            </form>

            <div class="links">
                <a onclick="redirectToLogin()">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </a>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình API
        const API_BASE_URL = 'http://localhost:8080/api';

        // DOM elements
        const tokenInfo = document.getElementById('tokenInfo');
        const resetForm = document.getElementById('resetPasswordForm');
        const alertContainer = document.getElementById('alertContainer');
        const tokenInput = document.getElementById('token');
        const emailInput = document.getElementById('email');
        const resetBtn = document.getElementById('resetBtn');

        // Kiểm tra token từ URL khi load trang
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const email = urlParams.get('email');

            console.log('Token from URL:', token);
            console.log('Email from URL:', email);

            if (token) {
                // Hiển thị thông tin
                tokenInput.value = token;
                
                if (email) {
                    emailInput.value = decodeURIComponent(email);
                    tokenInfo.innerHTML = `
                        <i class="fas fa-check-circle" style="color: var(--success-color);"></i>
                        <p>Đặt lại mật khẩu cho tài khoản:</p>
                        <div class="email">${decodeURIComponent(email)}</div>
                        <p style="margin-top: 10px; font-size: 0.9rem;">Vui lòng nhập mật khẩu mới</p>
                    `;
                } else {
                    tokenInfo.innerHTML = `
                        <i class="fas fa-info-circle" style="color: var(--primary-color);"></i>
                        <p>Vui lòng nhập mật khẩu mới</p>
                    `;
                }
                
                // Hiển thị form
                resetForm.style.display = 'block';
            } else {
                // Không có token
                tokenInfo.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color: var(--danger-color);"></i>
                    <p>Link không hợp lệ hoặc đã hết hạn</p>
                    <p style="margin-top: 10px; font-size: 0.9rem;">Vui lòng thử lại hoặc yêu cầu gửi lại email</p>
                `;
                resetForm.style.display = 'none';
            }
        });

        // Xử lý submit form
        resetForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const token = tokenInput.value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            console.log('Submitting reset password with token:', token);

            // Validate password
            if (newPassword.length < 6) {
                showAlert('error', 'Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('error', 'Mật khẩu xác nhận không khớp');
                return;
            }

            resetBtn.classList.add('btn-loading');
            resetBtn.innerHTML = '<i class="fas fa-spinner"></i> Đang xử lý...';

            try {
                // Gọi API reset-password
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        newPassword: newPassword
                    })
                });

                console.log('Response status:', response.status);
                
                // Đọc response (có thể là text hoặc json)
                let data;
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    data = await response.text();
                }
                
                console.log('Response data:', data);

                if (response.ok) {
                    // Thành công
                    showAlert('success', typeof data === 'string' ? data : 'Đặt lại mật khẩu thành công!');
                    
                    resetBtn.innerHTML = '<i class="fas fa-check"></i> Thành công!';
                    
                    // Chuyển về trang login sau 2 giây
                    setTimeout(() => {
                        redirectToLogin();
                    }, 2000);
                } else {
                    // Lỗi từ backend
                    const errorMsg = typeof data === 'string' ? data : (data.message || 'Có lỗi xảy ra');
                    showAlert('error', errorMsg);
                    
                    resetBtn.classList.remove('btn-loading');
                    resetBtn.innerHTML = '<i class="fas fa-save"></i> Đặt lại mật khẩu';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('error', 'Không thể kết nối đến server. Vui lòng thử lại sau.');
                
                resetBtn.classList.remove('btn-loading');
                resetBtn.innerHTML = '<i class="fas fa-save"></i> Đặt lại mật khẩu';
            }
        });

        // Check password strength
        document.getElementById('newPassword').addEventListener('input', function() {
            const password = this.value;
            const segments = document.querySelectorAll('.strength-segment');
            const strengthText = document.querySelector('.strength-text');

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            segments.forEach((segment, index) => {
                if (index < strength) {
                    segment.classList.add('active');
                } else {
                    segment.classList.remove('active');
                }
            });

            const levels = ['Rất yếu', 'Yếu', 'Trung bình', 'Khá', 'Mạnh', 'Rất mạnh'];
            strengthText.textContent = `Độ mạnh: ${levels[strength]}`;
            
            if (strength >= 4) {
                strengthText.style.color = 'var(--success-color)';
            } else if (strength >= 2) {
                strengthText.style.color = 'var(--warning-color)';
            } else {
                strengthText.style.color = 'var(--danger-color)';
            }
        });

        // Check password match
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = this.value;
            const errorDiv = document.getElementById('passwordMatchError');

            if (confirmPass && newPass !== confirmPass) {
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });

        // Toggle password visibility
        function togglePassword(inputId, event) {
            event.stopPropagation();
            const input = document.getElementById(inputId);
            const icon = event.target;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Show alert
        function showAlert(type, message) {
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas ${icons[type]}"></i>
                    <span>${message}</span>
                </div>
            `;

            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        // Redirect to login
        function redirectToLogin() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
